<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Ad - My Ads</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">📦 My Ads</a>
            <div class="nav-links" id="authLinks"></div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container" style="max-width: 600px;">
            <h1 class="form-title">Post New Ad</h1>
            <form id="postAdForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="form-label">Ad Title *</label>
                    <input type="text" class="form-input" id="title" required 
                           maxlength="100" placeholder="Enter a catchy title">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Category *</label>
                    <select class="form-select" id="category" required>
                        <option value="">Select Category</option>
                        <option value="PERSONAL">Personal</option>
                        <option value="PRODUCT">Product</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Description *</label>
                    <textarea class="form-textarea" id="description" required 
                              minlength="20" maxlength="2000"
                              placeholder="Describe your item or service in detail (min 20 characters)"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">WhatsApp Number *</label>
                    <input type="tel" class="form-input" id="whatsapp" required 
                           placeholder="e.g., +1234567890">
                    <small style="color: var(--text-secondary);">Buyers will contact you via this number</small>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Image</label>
                    <input type="file" class="form-file" id="image" accept="image/*">
                    <small style="color: var(--text-secondary);">Max 5MB. Recommended: 800x600px</small>
                </div>
                
                <div id="preview" style="margin-bottom: 1rem;"></div>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" style="color: var(--success-color); margin-bottom: 1rem; display: none;"></div>
                
                <div style="display: flex; gap: 1rem;">
                    <button type="button" class="btn btn-outline" onclick="history.back()" style="flex: 1;">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">
                        Submit for Approval
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        // Check authentication
        if (!requireAuth()) {
            throw new Error('Authentication required');
        }

        // Image preview
        document.getElementById('image').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const preview = document.getElementById('preview');
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" style="max-width: 200px; border-radius: 0.375rem;">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // Form submission
        document.getElementById('postAdForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('whatsappNumber', document.getElementById('whatsapp').value);
            
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }
            
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            
            try {
                const result = await createAd(formData);
                
                successDiv.textContent = 'Ad submitted successfully! It will be visible after admin approval.';
                successDiv.style.display = 'block';
                errorDiv.style.display = 'none';
                
                setTimeout(() => {
                    window.location.href = 'my-ads.html';
                }, 2000);
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit for Approval';
            }
        });
    </script>
</body>
</html>
